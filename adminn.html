    <style type="text/tailwindcss">
    @layer theme {
        :root {
            --primary: 153 75% 22%; /* Darker professional green */
            --bg-color: #f4f6f5;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --danger: 0 84% 60%;
        }
    }

    @layer base {
        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
        }
    }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: 'hsl(var(--primary))',
                        danger: 'hsl(var(--danger))',
                    },
                    boxShadow: {
                        'ios': '0 2px 8px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.02)',
